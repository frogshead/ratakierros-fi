services:
  api:
    image: ghcr.io/frogshead/ratakierros-fi/api:latest
    build: ./api
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - api-data:/data
    environment:
      - DATABASE_PATH=/data/ratakierros.db
      - JWT_SECRET=change-this-to-a-long-random-secret-in-production
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ghcr.io/frogshead/ratakierros-fi/frontend:latest
    build: .
    restart: unless-stopped
    ports:
      - "8080:8000"
    environment:
      - API_BASE=http://localhost:3000
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  api-data:
