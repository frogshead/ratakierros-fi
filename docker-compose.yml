services:
  api:
    image: ghcr.io/frogshead/ratakierros-fi/api:latest
    build: ./api
    restart: unless-stopped

  frontend:
    image: ghcr.io/frogshead/ratakierros-fi/frontend:latest
    build: .
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped
