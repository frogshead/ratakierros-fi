name: Build and Push Container Images

# Gate publish/deploy on a green CI run (which now includes e2e). This prevents
# the 744b2ff scenario — a runtime-broken image being published because cargo
# tests stayed green while the actual browser ↔ API integration was broken.
# workflow_dispatch is preserved for ad-hoc rebuilds.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Build/checkout the exact commit CI signed off on. workflow_run carries the
  # source sha out-of-band; for manual dispatch fall back to the dispatched ref.
  TARGET_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  build-api:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: ./api
          push: true
          tags: ${{ env.REGISTRY }}/frogshead/ratakierros-fi/api:latest
          build-args: |
            GIT_COMMIT=${{ env.TARGET_SHA }}

  build-frontend:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/frogshead/ratakierros-fi/frontend:latest
          build-args: |
            GIT_COMMIT=${{ env.TARGET_SHA }}

  audit-api:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        working-directory: api
        run: cargo audit

  scan-images:
    needs: [build-api, build-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        image:
          - ghcr.io/frogshead/ratakierros-fi/api:latest
          - ghcr.io/frogshead/ratakierros-fi/frontend:latest
    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Scan image with Grype
        uses: anchore/scan-action@v6
        with:
          image: ${{ matrix.image }}
          fail-build: true
          severity-cutoff: high
          only-fixed: true

  sbom:
    needs: [build-api, build-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ghcr.io/frogshead/ratakierros-fi/api:latest
            artifact: sbom-api
          - image: ghcr.io/frogshead/ratakierros-fi/frontend:latest
            artifact: sbom-frontend
    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ matrix.image }}
          format: cyclonedx-json
          artifact-name: ${{ matrix.artifact }}.cyclonedx.json
          upload-artifact: true
          upload-artifact-retention: 90

  deploy:
    needs: [build-api, build-frontend, audit-api, scan-images, sbom]
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to VM
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes \
              "$SSH_USER@$SSH_HOST" 'bash -s' <<REMOTE
          set -euo pipefail
          cd /home/mikko/github/ratakierros-fi
          git pull --ff-only
          umask 077
          printf 'JWT_SECRET=%s\n' '$JWT_SECRET' > .env
          docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
          docker image prune -f
          REMOTE
