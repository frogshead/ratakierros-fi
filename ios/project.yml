name: Ratakierros
options:
  bundleIdPrefix: fi.ratakierros
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    CODE_SIGNING_ALLOWED: NO
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  Ratakierros:
    type: application
    platform: iOS
    sources:
      - path: Sources/Ratakierros
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: Ratakierros
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        NSLocationWhenInUseUsageDescription: "Käytetään lähimmän juoksuradan löytämiseen."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        API_BASE: "https://ratakierros.fi"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fi.ratakierros.app
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_PLATFORMS: "iphonesimulator iphoneos"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
