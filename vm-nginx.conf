# Host nginx site for ratakierros.fi
# Place in /etc/nginx/sites-available/ratakierros.fi.conf and symlink to sites-enabled.
# After deploying this HTTP-only version, run:
#   sudo certbot --nginx -d ratakierros.fi -d www.ratakierros.fi
# certbot will rewrite this file to add the 443 server block and HTTPS redirect.

server {
    listen 80;
    listen [::]:80;
    server_name ratakierros.fi www.ratakierros.fi;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
